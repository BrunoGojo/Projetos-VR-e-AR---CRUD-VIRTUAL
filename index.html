<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRUD VR com A-Frame</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside class="panel">
    <h1>CRUD em Realidade Virtual</h1>
    <p>
      Cada registro do CRUD é representado por um cubo 3D dentro da cena.
      Você pode selecionar um item clicando no cubo.
    </p>

    <h2>Formulário</h2>
    <div class="grid">
      <input id="itemId" type="text" placeholder="ID do item" readonly />
      <input id="itemName" type="text" placeholder="Nome do item" />
      <input id="itemCategory" type="text" placeholder="Categoria" />

      <select id="itemColor">
        <option value="#ef4444">Vermelho</option>
        <option value="#22c55e">Verde</option>
        <option value="#3b82f6">Azul</option>
        <option value="#eab308">Amarelo</option>
        <option value="#a855f7">Roxo</option>
        <option value="#f97316">Laranja</option>
      </select>

      <input id="itemSize" type="number" min="0.6" max="2.5" step="0.1" value="1" />
    </div>

    <h2>Ações CRUD</h2>
    <div class="grid">
      <button class="btn-create" id="createBtn">POST → Criar</button>
      <button class="btn-update" id="updateBtn">PUT → Atualizar</button>
      <button class="btn-delete" id="deleteBtn">DELETE → Remover</button>

      <div class="inline">
        <button class="btn-mock" id="mockBtn">Gerar mocks</button>
        <button class="btn-clear" id="clearBtn">Limpar tudo</button>
      </div>
    </div>

    <div class="status" id="statusBox">Pronto para uso.</div>

    <h2>Lista virtual (GET)</h2>
    <div id="itemsList"></div>
  </aside>

  <a-scene background="color: #0b1120">
    <a-entity position="0 1.6 6">
      <a-camera>
        <a-cursor
          fuse="true"
          fuse-timeout="1200"
          color="#FFFFFF"
          material="shader: flat; color: #ffffff"
        ></a-cursor>
      </a-camera>
    </a-entity>

    <a-entity light="type: ambient; intensity: 0.8"></a-entity>
    <a-entity light="type: directional; intensity: 1.1" position="1 4 2"></a-entity>

    <a-plane
      position="0 0 -8"
      rotation="-90 0 0"
      width="30"
      height="30"
      color="#1e293b"
    ></a-plane>

    <a-sky color="#0f172a"></a-sky>

    <a-text
      value="CRUD em Realidade Virtual"
      position="0 4 -8"
      align="center"
      color="#93c5fd"
      width="10"
    ></a-text>

    <a-text
      value="Clique ou use gaze para selecionar um item"
      position="0 3.4 -8"
      align="center"
      color="#e2e8f0"
      width="8"
    ></a-text>

    <a-entity id="itemsContainer"></a-entity>
  </a-scene>

  <script src="app.js"></script>
</body>
</html>
